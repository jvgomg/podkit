# Lima VM: Virtual iPod (Debian 12 Bookworm)
#
# Provides a Linux environment with USB gadget support for the virtual iPod
# demo system. Simulates a machine with podkit installed — `vipod:shell`
# drops you into an isolated home directory with `podkit` in PATH.
#
# The host podkit repo is mounted read-write via Lima's default sharing.
# To avoid clobbering macOS node_modules, `vipod:install` creates a
# VM-local node_modules and symlinks it into the repo.
#
# Usage:
#   mise run vipod:create    # Create the VM
#   mise run vipod:start     # Start the VM
#   mise run vipod:install   # Build podkit for Linux, install to /usr/local/bin
#   mise run vipod:server    # Start the virtual-ipod-server
#   mise run vipod:shell     # SSH-like shell with podkit in PATH

images:
  - location: 'https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-arm64.qcow2'
    arch: 'aarch64'
  - location: 'https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-amd64.qcow2'
    arch: 'x86_64'

mounts:
  - location: '~'
    writable: true

cpus: 2
memory: '2GiB'
disk: '20GiB'

portForwards:
  - guestPort: 3456
    hostPort: 3456
    proto: tcp

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux

      echo "=== Installing system dependencies ==="
      apt-get update
      apt-get install -y \
        build-essential \
        pkg-config \
        libgpod-dev \
        libglib2.0-dev \
        ffmpeg \
        util-linux \
        git \
        curl \
        unzip \
        kmod \
        dosfstools \
        python3 \
        rsync

      echo "=== Installing Node.js 22 LTS ==="
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs

      echo "=== Installing Bun (system-wide) ==="
      if ! command -v bun &> /dev/null; then
        curl -fsSL https://bun.sh/install | BUN_INSTALL=/usr/local bash
      fi

      echo "=== Mounting configfs for USB gadget support ==="
      if ! mountpoint -q /sys/kernel/config; then
        mount -t configfs none /sys/kernel/config
      fi
      if ! grep -q configfs /etc/fstab; then
        echo 'none /sys/kernel/config configfs defaults 0 0' >> /etc/fstab
      fi

      echo "=== Verifying kernel modules ==="
      modinfo dummy_hcd > /dev/null 2>&1 || echo "WARNING: dummy_hcd module not available"
      modinfo usb_f_mass_storage > /dev/null 2>&1 || echo "WARNING: usb_f_mass_storage module not available"

      echo "=== Creating directories ==="
      mkdir -p /var/lib/virtual-ipod
      mkdir -p /mnt/ipod
      mkdir -p /opt/podkit

      # Set up the james user with an isolated home directory
      if id james &>/dev/null; then
        sed -i 's|:/home/james\.guest:|:/home/james:|' /etc/passwd
      else
        useradd -m -s /bin/bash james
      fi
      mkdir -p /home/james
      cp -a /etc/skel/. /home/james/ 2>/dev/null || true
      chown -R james:james /home/james
      echo 'james ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/james
