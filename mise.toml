[tools]
bun = "1.3.9"
rust = "latest"

[env]
# Add local bin directory to PATH for project tools
_.path = ["./bin"]

[tasks."tools:build"]
description = "Build all native tools (gpod-tool)"
run = """
#!/usr/bin/env bash
set -e

# Set up libgpod paths (macOS local build)
export PKG_CONFIG_PATH="$HOME/.local/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
export DYLD_LIBRARY_PATH="$HOME/.local/lib:${DYLD_LIBRARY_PATH:-}"

mkdir -p bin
echo "Building gpod-tool..."
make -C tools/gpod-tool clean
make -C tools/gpod-tool
cp tools/gpod-tool/gpod-tool bin/
echo "Tools built successfully. Available in ./bin/"
echo ""
echo "Run 'mise trust' and restart your shell, then gpod-tool will be in PATH."
"""

[tasks."tools:clean"]
description = "Clean all native tool builds"
run = """
#!/usr/bin/env bash
set -e
rm -rf bin
make -C tools/gpod-tool clean 2>/dev/null || true
echo "Cleaned."
"""

[tasks."tools:brew-test"]
description = "Smoke test the brew install of podkit on Debian (via Docker)"
run = """
#!/usr/bin/env bash
set -e
docker compose -f tools/brew-test/docker-compose.yml up --build --exit-code-from smoke-test
"""

# ---------------------------------------------------------------------------
# Lima VMs (cross-platform testing on Debian + Alpine)
# ---------------------------------------------------------------------------

[tasks."lima:test"]
description = "Run test suite on both Linux VMs (Debian + Alpine)"
run = "tools/lima/run-tests.sh all"

[tasks."lima:test:debian"]
description = "Run test suite on Debian VM"
run = "tools/lima/run-tests.sh debian"

[tasks."lima:test:alpine"]
description = "Run test suite on Alpine VM"
run = "tools/lima/run-tests.sh alpine"

[tasks."lima:stop"]
description = "Stop Lima VMs (preserves state for fast restart)"
run = "limactl stop podkit-debian 2>/dev/null; limactl stop podkit-alpine 2>/dev/null; echo Done."

[tasks."lima:destroy"]
description = "Delete Lima VMs entirely"
run = "limactl delete podkit-debian --force 2>/dev/null; limactl delete podkit-alpine --force 2>/dev/null; echo Done."

# ---------------------------------------------------------------------------
# Virtual iPod (Lima VM + server)
# ---------------------------------------------------------------------------

[tasks."vipod:create"]
description = "Create the virtual iPod Lima VM"
run = "limactl create --name virtual-ipod tools/lima/virtual-ipod.yaml"

[tasks."vipod:start"]
description = "Start the virtual iPod VM"
run = "limactl start virtual-ipod"

[tasks."vipod:stop"]
description = "Stop the virtual iPod VM"
run = "limactl stop virtual-ipod"

[tasks."vipod:shell"]
description = "Open an isolated shell in the VM (simulates SSH with podkit installed)"
run = "limactl shell virtual-ipod -- sudo -iu james"

[tasks."vipod:install"]
description = "Build podkit for Linux and install to /usr/local/bin inside the VM"
run = """
#!/usr/bin/env bash
set -e

HOST_SRC="/Users/james/Development/projects/podkit"
VM_DIR="/opt/podkit"

echo "=== Syncing source to VM-local directory ==="
limactl shell virtual-ipod -- sudo bash -c "
  mkdir -p $VM_DIR
  rsync -a --delete \
    --exclude node_modules \
    --exclude .turbo \
    --exclude dist \
    --exclude build \
    --exclude '.git' \
    --exclude 'packages/podkit-cli/bin' \
    --exclude 'packages/demo/bin' \
    --exclude 'packages/ipod-db/fixtures/databases' \
    --exclude 'packages/libgpod-node/prebuilds' \
    --exclude 'tools/libgpod-macos/build' \
    --exclude '*.img' \
    --exclude 'src-tauri/target' \
    $HOST_SRC/ $VM_DIR/
"

echo "=== Installing dependencies ==="
limactl shell virtual-ipod -- sudo bash -c "cd $VM_DIR && bun install"

echo "=== Building native libgpod binding for Linux ==="
limactl shell virtual-ipod -- sudo bash -c "cd $VM_DIR/packages/libgpod-node && npx node-gyp rebuild"

echo "=== Building packages ==="
limactl shell virtual-ipod -- sudo bash -c "
  cd $VM_DIR && bun turbo build \
    --filter=@podkit/core \
    --filter=podkit \
    --filter=@podkit/libgpod-node \
    --filter=@podkit/ipod-db \
    --filter=@podkit/ipod-web \
    --filter=@podkit/virtual-ipod-server \
    --filter=@podkit/virtual-ipod-app
"

echo "=== Compiling podkit binary ==="
limactl shell virtual-ipod -- sudo bash -c "cd $VM_DIR/packages/podkit-cli && bash scripts/compile.sh"

echo "=== Installing to /usr/local/bin ==="
limactl shell virtual-ipod -- sudo bash -c "
  cp $VM_DIR/packages/podkit-cli/bin/podkit /usr/local/bin/podkit
  chmod +x /usr/local/bin/podkit
  chown -R james:james /home/james
"

echo "=== Installing shell completions ==="
limactl shell virtual-ipod -- sudo -u james bash -c 'mkdir -p ~/.bashrc.d && podkit completions bash > ~/.bashrc.d/podkit'
limactl shell virtual-ipod -- sudo -u james bash << 'BASHRC'
grep -q bashrc.d ~/.bashrc 2>/dev/null || cat >> ~/.bashrc << 'EOF'
for f in ~/.bashrc.d/*; do source "$f"; done
EOF
BASHRC

echo ""
echo "=== Done ==="
limactl shell virtual-ipod -- sudo -iu james podkit --version
echo "podkit installed. Run: mise run vipod:shell"
"""

[tasks."vipod:server"]
description = "Start the virtual iPod server inside the VM"
run = "limactl shell virtual-ipod -- sudo bash -c 'cd /opt/podkit/packages/virtual-ipod-server && bun run src/main.ts'"

[tasks."vipod:plug"]
description = "Plug the virtual iPod into USB"
run = """
curl -s -X POST -H 'Content-Type: application/json' \
  -d '{"ipodId":"default"}' \
  http://localhost:3456/usb/plug && echo 'Plugged in'
"""

[tasks."vipod:unplug"]
description = "Unplug the virtual iPod from USB"
run = "curl -s -X POST http://localhost:3456/usb/unplug && echo 'Unplugged'"

[tasks."vipod:status"]
description = "Check virtual iPod storage and USB status"
run = """
echo '=== iPod Storages ===' && \
curl -s http://localhost:3456/ipods | python3 -m json.tool && \
echo '=== USB Bus ===' && \
curl -s http://localhost:3456/usb/status | python3 -m json.tool
"""

[tasks."vipod:wipe"]
description = "Wipe the virtual iPod storage and recreate it"
run = """
curl -s -X DELETE http://localhost:3456/ipods/default > /dev/null && \
curl -s -X POST -H 'Content-Type: application/json' \
  -d '{"id":"default"}' \
  http://localhost:3456/ipods | python3 -m json.tool
"""

[tasks."vipod:destroy"]
description = "Delete the virtual iPod VM entirely"
run = "limactl delete virtual-ipod --force 2>/dev/null; echo Done."

[tasks."tools:check"]
description = "Build and test all native tools"
depends = ["tools:build"]
run = """
#!/usr/bin/env bash
set -e

# Set up libgpod paths (macOS local build)
export PKG_CONFIG_PATH="$HOME/.local/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
export DYLD_LIBRARY_PATH="$HOME/.local/lib:${DYLD_LIBRARY_PATH:-}"

echo "Running gpod-tool tests..."
make -C tools/gpod-tool check
"""
