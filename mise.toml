[tools]
bun = "1.3.9"

[env]
# Add local bin directory to PATH for project tools
_.path = ["./bin"]

[tasks."tools:build"]
description = "Build all native tools (gpod-tool)"
run = """
#!/usr/bin/env bash
set -e

# Set up libgpod paths (macOS local build)
export PKG_CONFIG_PATH="$HOME/.local/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
export DYLD_LIBRARY_PATH="$HOME/.local/lib:${DYLD_LIBRARY_PATH:-}"

mkdir -p bin
echo "Building gpod-tool..."
make -C tools/gpod-tool clean
make -C tools/gpod-tool
cp tools/gpod-tool/gpod-tool bin/
echo "Tools built successfully. Available in ./bin/"
echo ""
echo "Run 'mise trust' and restart your shell, then gpod-tool will be in PATH."
"""

[tasks."tools:clean"]
description = "Clean all native tool builds"
run = """
#!/usr/bin/env bash
set -e
rm -rf bin
make -C tools/gpod-tool clean 2>/dev/null || true
echo "Cleaned."
"""

[tasks."tools:brew-test"]
description = "Smoke test the brew install of podkit on Debian (via Docker)"
run = """
#!/usr/bin/env bash
set -e
docker compose -f tools/brew-test/docker-compose.yml up --build --exit-code-from smoke-test
"""

# ---------------------------------------------------------------------------
# Lima VMs (cross-platform testing on Debian + Alpine)
# ---------------------------------------------------------------------------

[tasks."lima:test"]
description = "Run test suite on both Linux VMs (Debian + Alpine)"
run = "tools/lima/run-tests.sh all"

[tasks."lima:test:debian"]
description = "Run test suite on Debian VM"
run = "tools/lima/run-tests.sh debian"

[tasks."lima:test:alpine"]
description = "Run test suite on Alpine VM"
run = "tools/lima/run-tests.sh alpine"

[tasks."lima:stop"]
description = "Stop Lima VMs (preserves state for fast restart)"
run = "limactl stop podkit-debian 2>/dev/null; limactl stop podkit-alpine 2>/dev/null; echo Done."

[tasks."lima:destroy"]
description = "Delete Lima VMs entirely"
run = "limactl delete podkit-debian --force 2>/dev/null; limactl delete podkit-alpine --force 2>/dev/null; echo Done."

[tasks."tools:check"]
description = "Build and test all native tools"
depends = ["tools:build"]
run = """
#!/usr/bin/env bash
set -e

# Set up libgpod paths (macOS local build)
export PKG_CONFIG_PATH="$HOME/.local/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
export DYLD_LIBRARY_PATH="$HOME/.local/lib:${DYLD_LIBRARY_PATH:-}"

echo "Running gpod-tool tests..."
make -C tools/gpod-tool check
"""
